<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventy Admin</title>
    <script>
      // ضبط الثيم قبل الرسم لمنع الوميض
      try {
        var s = JSON.parse(localStorage.getItem("eventy-admin-theme"));
        if (s && s.state && s.state.theme) document.documentElement.dataset.theme = s.state.theme;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
